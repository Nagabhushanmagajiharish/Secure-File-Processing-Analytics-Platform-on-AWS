name: Infra Deploy

on:
  pull_request:
    paths:
      - "infra/main-module/**"
      - ".github/workflows/infra.yml"
  push:
    branches:
      - main
    paths:
      - "infra/main-module/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  TF_IN_AUTOMATION: true
  ECR_REPOSITORY: clamav-scanner
  AWS_ACCOUNT_ID: "061039787667"

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061039787667:role/github-actions-oidc-role
          aws-region: eu-west-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

  apply:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061039787667:role/github-actions-oidc-role
          aws-region: eu-west-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Create ECR repository first
        run: terraform apply -target=aws_ecr_repository.clamav -auto-approve

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build scanner image
        run: docker build -t $ECR_REPOSITORY .

      - name: Tag scanner image
        run: docker tag $ECR_REPOSITORY:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push scanner image
        run: docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Run Glue crawler
        run: aws glue start-crawler --name scan-results-crawler --region eu-west-2

      - name: Wait for crawler to finish
        run: |
          while true; do
            STATUS=$(aws glue get-crawler --name scan-results-crawler --region eu-west-2 --query 'Crawler.State' --output text)
            if [ "$STATUS" = "READY" ]; then
              echo "Crawler finished"
              break
            fi
            echo "Crawler status: $STATUS"
            sleep 20
          done

  destroy:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061039787667:role/github-actions-oidc-role
          aws-region: eu-west-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
